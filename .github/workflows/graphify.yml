name: graphify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install graphify CLI
        run: pip install graphifyy==0.9.16
      - name: Update graph
        run: graphify update .
      - name: Commit or verify graph
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graphify-out/
          if git diff --cached --quiet; then
            echo "No graph changes."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "graphify-out/ is out of date. Run 'graphify update .' locally and commit the changes."
            exit 1
          fi
          branch="chore/graphify-update-${{ github.run_id }}"
          git checkout -b "$branch"
          git commit -m "chore: update graphify graph"
          git push origin "$branch"
          gh pr create --title "chore: update graphify graph" --body "Auto-generated graph update." --base main --head "$branch"
