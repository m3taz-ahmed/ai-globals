name: AI Global OS Integrity

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate v4.20.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python scripts/tests/test_validator.py
        working-directory: ${{ github.workspace }}

      - name: Run integrity validator
        run: python scripts/validate-globals.py --force
        working-directory: ${{ github.workspace }}

      - name: Run PowerShell validator (smoke test)
        shell: pwsh
        run: .\scripts\validate-globals.ps1 -Force
        working-directory: ${{ github.workspace }}
