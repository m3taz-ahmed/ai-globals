name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy runtime memory aios_mcp cli.py config.py dashboard/server.py
      - name: Test
        run: python -m pytest -q
      - name: Validate globals
        run: python scripts/validate-globals.py

